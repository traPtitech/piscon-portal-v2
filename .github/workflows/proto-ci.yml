name: Protobuf CI

on:
  push:
    branches:
      - main
    paths:
      - "proto/**"
  pull_request:
    paths:
      - "proto/**"

jobs:
  buf:
    name: buf check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          version: 1.49.0
          push: false

  buf-gen:
    name: buf generate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          version: 1.49.0
          setup_only: true

      - name: Generate
        run: buf generate
        shell: bash

      - name: Exit if diff exists
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Generated files are different from committed files. Please run 'buf generate' and commit the changes."
            exit 1
          fi
        shell: bash
